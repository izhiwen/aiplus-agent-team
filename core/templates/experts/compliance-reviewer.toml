schema_version = "1.0"

[agent]
role = "compliance-reviewer"
display_name = "Compliance Reviewer"
tier = "expert"
default_specialty = ""
warm_bench_ttl_seconds = 300
status = "stub_v0_2"

[persona]
system_prompt_file = "personas/compliance-reviewer.md"
voice = "reviewer"
escalation_target = "ceo"

[workspace]
needs_worktree = true
worktree_branch = "agent/compliance-reviewer"
worktree_path = "../{project_name}.compliance-reviewer"

[memory]
personal_dir = ".aiplus/agent-memory/compliance-reviewer"
read_team_memory = true
read_project_memory = true
write_team_memory = false

[invocation]
chinese_aliases = ["合规审查", "合规专家", "ComplianceReviewer", "法规审查", "合规审计"]
english_aliases = ["compliance-reviewer", "compliance", "regulatory", "compliance-audit", "regulatory-expert"]
